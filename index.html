<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>เติมบุญ — บุญWallet</title>
  <meta name="description" content="เกม idle clicker สะสมแต้มบุญ เวียนว่ายตายเกิด จนถึงนิพพาน" />
  <meta name="theme-color" content="#b8862c" />
  <meta property="og:title" content="เติมบุญ — บุญWallet" />
  <meta property="og:description" content="เกม idle clicker สะสมแต้มบุญ เวียนว่ายตายเกิด จนถึงนิพพาน" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%AA%99</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chonburi&family=IBM+Plex+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <script defer src="https://umami-host-peerapongsms-projects.vercel.app/script.js"
    data-website-id="3f09453d-0b39-443e-8845-5e65611cc58a"></script>
</head>
<body>
  <div id="app" class="wallet">
    <header class="balance-card">
      <div class="balance-label">ยอดบุญคงเหลือ</div>
      <div class="balance-amount" id="boon-display" tabindex="0">0</div>
      <div class="balance-rate" id="bps-display">+0 บุญ/วิ</div>
      <div class="rebirth-badge" id="rebirth-badge">ภพ: หมาวัด</div>
      <button id="mute-btn" class="icon-btn" aria-label="ปิดเสียง">🔔</button>
    </header>

    <div id="event-banner" class="event-banner" hidden>
      <button id="event-claim" class="event-claim"></button>
    </div>

    <main class="click-area">
      <button id="clickable" class="clickable" aria-label="ทำบุญ">
        <span id="click-tier-art" class="click-art" data-tier="0" aria-hidden="true"></span>
        <span id="click-tier-name" class="click-tier-name">หยอดเหรียญตู้บริจาค</span>
      </button>
      <div id="float-layer" class="float-layer" aria-hidden="true"></div>
    </main>

    <nav class="tab-bar">
      <button class="tab active" data-panel="services">บริการ</button>
      <button class="tab" data-panel="upgrades">เครื่องราง</button>
      <button class="tab" data-panel="profile">โปรไฟล์</button>
    </nav>

    <section id="panel-services" class="panel"></section>
    <section id="panel-upgrades" class="panel" hidden></section>
    <section id="panel-profile" class="panel" hidden>
      <div id="achievements-list"></div>
      <div id="stats-block"></div>
      <button id="prestige-btn" class="danger-btn" hidden>สิ้นอายุขัย</button>
      <button id="nirvana-btn" class="nirvana-btn" hidden>นิพพาน</button>
      <p class="about-link"><a href="/about.html" class="link-btn">เกี่ยวกับเกมนี้</a></p>
    </section>

    <div id="toast-layer" class="toast-layer" aria-live="polite"></div>
    <dialog id="confirm-dialog"></dialog>
  </div>
  <div id="ending-screen" class="ending" hidden></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
